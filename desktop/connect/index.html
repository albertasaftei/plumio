<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Plumio</title>
    <link rel="stylesheet" href="connect.css" />
  </head>
  <body>
    <div class="connect-screen">
      <div class="connect-card">
        <div class="connect-logo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="48"
            height="48"
            viewBox="0 0 48 48"
          >
            <g
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="3"
            >
              <path
                d="M11.999 41a32.85 32.85 0 0 0 16.68-4.52c.665-.39.61-1.348-.081-1.691L25 33c3.303 0 10-1.337 10-1.337c7.147-6.948 10.78-16.97 9.848-26.842a1.85 1.85 0 0 0-1.67-1.67A33.2 33.2 0 0 0 28 5.25S26.348 9.142 26 11l-2.024-2.817a.98.98 0 0 0-1.309-.271C13.264 13.687 7 23.36 7 36.5"
              />
              <path d="M3 45c5-14.5 21-27 34-34" />
            </g>
          </svg>
        </div>

        <h1 class="connect-title">Plumio</h1>
        <p class="connect-subtitle">
          Choose how to use Plumio on this computer
        </p>

        <!-- Mode tabs -->
        <div class="mode-tabs" role="tablist">
          <button
            class="mode-tab active"
            id="tab-local"
            role="tab"
            aria-selected="true"
            aria-controls="panel-local"
          >
            <span class="tab-icon">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="3" width="20" height="14" rx="2" />
                <path d="M8 21h8M12 17v4" />
              </svg>
            </span>
            This computer
          </button>
          <button
            class="mode-tab"
            id="tab-remote"
            role="tab"
            aria-selected="false"
            aria-controls="panel-remote"
          >
            <span class="tab-icon">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <path
                  d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                />
              </svg>
            </span>
            Remote server
          </button>
        </div>

        <!-- Local mode panel -->
        <div
          class="tab-panel"
          id="panel-local"
          role="tabpanel"
          aria-labelledby="tab-local"
        >
          <p class="panel-description">
            Your documents are stored locally on this computer. No server setup
            required — everything works offline.
          </p>
          <button class="connect-btn" id="local-btn" type="button">
            <span class="btn-text">Use local storage</span>
          </button>
        </div>

        <!-- Remote mode panel -->
        <div
          class="tab-panel hidden"
          id="panel-remote"
          role="tabpanel"
          aria-labelledby="tab-remote"
        >
          <p class="panel-description">
            Connect to a self-hosted Plumio server. Your documents are stored on
            the remote server and accessible from any device.
          </p>

          <div id="error-message" class="error-message" hidden></div>

          <form id="connect-form" novalidate>
            <div class="input-group">
              <label for="server-url">Server URL</label>
              <input
                id="server-url"
                type="url"
                placeholder="https://plumio.example.com"
                autocomplete="url"
                autocorrect="off"
                autocapitalize="none"
                spellcheck="false"
              />
            </div>

            <button class="connect-btn" id="connect-btn" type="submit">
              <span class="btn-text">Connect</span>
              <span class="btn-spinner" hidden></span>
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="connect.js"></script>
  </body>
</html>
