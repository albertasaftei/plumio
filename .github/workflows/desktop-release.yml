name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g. v1.2.3). Defaults to the commit ref when omitted."
        required: false
        default: ""

permissions:
  contents: write # needed to create/upload GitHub Releases

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Build frontend (SPA)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build:desktop

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Package .dmg
        working-directory: desktop
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: desktop/release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Build frontend (SPA)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build:desktop

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --ignore-scripts

      - name: Package .exe
        working-directory: desktop
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: desktop/release/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Build frontend (SPA)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build:desktop

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --ignore-scripts

      - name: Package .AppImage
        working-directory: desktop
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: desktop/release/*.AppImage
