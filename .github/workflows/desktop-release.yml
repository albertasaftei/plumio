name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: true

permissions:
  contents: write # needed to create/upload GitHub Releases

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Build frontend (SPA)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build:desktop

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --ignore-scripts

      - name: Rebuild native modules for Electron
        working-directory: desktop
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Verify native module
        working-directory: desktop
        run: |
          ls -la node_modules/better-sqlite3/build/Release/better_sqlite3.node
          file node_modules/better-sqlite3/build/Release/better_sqlite3.node

      - name: Package .dmg
        working-directory: desktop
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') || inputs.prerelease }}
          files: |
            desktop/release/*.dmg
            desktop/release/latest-mac.yml

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Build frontend (SPA)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build:desktop

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --ignore-scripts

      - name: Rebuild native modules for Electron
        working-directory: desktop
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Verify native module
        working-directory: desktop
        run: |
          if (!(Test-Path "node_modules/better-sqlite3/build/Release/better_sqlite3.node")) { throw "better-sqlite3 native binding not found" }
          Write-Host "better-sqlite3 native binding OK"
        shell: pwsh

      - name: Package .exe
        working-directory: desktop
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') || inputs.prerelease }}
          files: |
            desktop/release/*.exe
            desktop/release/latest.yml
